name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-dockerize:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set image tag
        id: set_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="v1.0.${{ github.run_number }}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bsfye/bsfye-frontend:latest
            bsfye/bsfye-frontend:${{ steps.set_tag.outputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}

  deploy:
    needs: build-and-dockerize
    runs-on: self-hosted
    steps:
      - name: Pull image from Docker Hub
        run: docker pull bsfye/bsfye-frontend:${{ needs.build-and-dockerize.outputs.image_tag }}
      - name: Stop and remove existing container
        run: |
          docker stop bsfye-frontend-container || true
          docker rm bsfye-frontend-container || true
      - name: Run Docker container
        run: |
          docker run -d --restart=always -p 3000:3000 --name bsfye-frontend-container \
            -e NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            -e NEXT_PUBLIC_RAZORPAY_KEY_ID="${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}" \
            bsfye/bsfye-frontend:${{ needs.build-and-dockerize.outputs.image_tag }}
      - name: Clean up old untagged images
        run: docker image prune -f
