name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-dockerize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: bsfye/bsfye-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    needs: build-and-dockerize
    runs-on: self-hosted
    steps:
      - name: Pull image from Docker Hub
        run: docker pull bsfye/bsfye-frontend:latest

      - name: Stop and remove existing container
        run: |
          docker stop bsfye-frontend-container || true
          docker rm bsfye-frontend-container || true

      - name: Run Docker container
        run: |
          docker run -d --restart=always -p 3000:3000 --name bsfye-frontend-container \
            -e NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            bsfye/bsfye-frontend:latest
